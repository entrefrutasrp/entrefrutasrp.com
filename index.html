<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entre Frutas</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#fdfaf6; }
.cart-slide { transition: transform .3s ease; }
.star { cursor:pointer; font-size:22px; }
.star.active { color:#facc15; }
</style>
</head>

<body class="text-gray-800">

<!-- HEADER -->
<header class="bg-amber-900 text-white sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-4 text-center relative">
    <h1 class="text-2xl font-bold">Entre Frutas</h1>

    <button onclick="toggleCart()" class="absolute right-4 top-4 text-xl">
      🛒
      <span id="cart-count"
        class="absolute -top-2 -right-2 bg-red-600 text-white text-xs px-2 rounded-full">0</span>
    </button>
  </div>
</header>

<!-- BANNER -->
<section class="bg-amber-100 py-12 text-center">
  <h2 class="text-4xl font-bold text-amber-900">
    Produtos Artesanais
  </h2>

  <p class="mt-3 text-lg text-amber-800 max-w-xl mx-auto">
    Açaí cremoso, gelado e feito pra viciar 😍
  </p>
</section>

<!-- PRODUTOS -->
<main class="max-w-6xl mx-auto px-4 py-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

<script>
const products = [

 {id:1,name:"Açaí com mousse de ninho (500ml)",price:22,img:"LINK-ACAI"},
 {id:2,name:"Açaí com mousse de morango (500ml)",price:26,img:"LINK-ACAI"},
 {id:3,name:"Açaí com mousse de maracujá (500ml)",price:22,img:"LINK-ACAI"},
 {id:4,name:"Açaí com creme de Nutella (500ml)",price:28.5,img:"LINK-ACAI"},
 {id:5,name:"Açaí com creme de Kinder (500ml)",price:28.5,img:"LINK-ACAI"},
 {id:6,name:"Açaí com suco de laranja (500ml)",price:20,img:"LINK-ACAI"},

 {id:7,name:"Açaí com mousse de ninho (300ml)",price:13.99,img:"LINK-ACAI"},
 {id:8,name:"Açaí com mousse de morango (300ml)",price:16,img:"LINK-ACAI"},
 {id:9,name:"Açaí com mousse de maracujá (300ml)",price:13.99,img:"LINK-ACAI"},
 {id:10,name:"Açaí com creme de Nutella (300ml)",price:18,img:"LINK-ACAI"},
 {id:11,name:"Açaí com creme de Kinder (300ml)",price:18.5,img:"LINK-ACAI"},
 {id:12,name:"Açaí com suco de laranja (300ml)",price:15,img:"LINK-ACAI"}

];

let cart = [];

products.forEach(p=>{
document.write(`
<div class="bg-white rounded-xl p-5 shadow text-center flex flex-col">
  <img src="${p.img}" class="w-full h-40 object-cover rounded mb-3">

  <h3 class="font-bold mb-1">${p.name}</h3>
  <p class="mb-3 font-semibold">R$ ${p.price.toFixed(2).replace('.',',')}</p>

  <button onclick="addToCart(${p.id})"
    class="bg-amber-900 text-white py-2 rounded hover:bg-amber-800">
    Adicionar
  </button>
</div>
`);
});
</script>

</main>

<!-- AVALIAÇÕES -->
<section class="bg-white py-12">
  <h3 class="text-3xl font-bold text-center text-amber-900 mb-6">
    Avaliações dos Clientes ⭐
  </h3>

  <div class="max-w-xl mx-auto px-4 space-y-4 mb-10">
    <input id="comment-name" placeholder="Seu nome"
      class="w-full border p-3 rounded">

    <textarea id="comment-text" placeholder="Seu comentário"
      class="w-full border p-3 rounded h-28"></textarea>

    <div class="flex gap-1 justify-center">
      <span class="star" onclick="setStars(1)">★</span>
      <span class="star" onclick="setStars(2)">★</span>
      <span class="star" onclick="setStars(3)">★</span>
      <span class="star" onclick="setStars(4)">★</span>
      <span class="star" onclick="setStars(5)">★</span>
    </div>

    <button onclick="addComment()"
      class="w-full bg-amber-900 text-white py-3 rounded font-bold">
      Enviar avaliação
    </button>
  </div>

  <div id="comments"
    class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 px-4">
  </div>
</section>

<!-- RODAPÉ -->
<footer class="bg-amber-900 text-white py-10 text-center">
  <h4 class="text-2xl font-bold mb-2">Entre Frutas</h4>
  <p class="text-amber-200 mb-4">Açaí na Garrafa</p>

  <a href="https://www.instagram.com/entrefrutasribeirao" target="_blank">
    📷 Instagram
  </a>

  <p class="mt-6 text-sm text-amber-300">
    Transformando seu dia com o melhor açaí 🍓
  </p>
</footer>

<!-- CARRINHO -->
<div id="cart"
 class="fixed top-0 right-0 w-full max-w-sm h-full bg-white shadow-lg cart-slide translate-x-full z-50 flex flex-col">

<div class="p-4 flex justify-between items-center border-b">
  <h3 class="font-bold">Seu carrinho</h3>
  <button onclick="toggleCart()">❌</button>
</div>

<div id="cart-items" class="flex-1 p-4 space-y-3 overflow-y-auto"></div>

<div class="p-4 border-t space-y-3">
  <p class="font-bold">Total: <span id="cart-total">R$ 0,00</span></p>

  <input id="nome" placeholder="Seu nome"
    class="w-full border p-2 rounded">

  <input id="endereco" placeholder="Endereço completo"
    class="w-full border p-2 rounded">

  <button onclick="clearCart()" class="w-full bg-gray-300 py-2 rounded">
    Limpar carrinho
  </button>

  <button onclick="checkout()"
    class="w-full bg-green-600 text-white py-3 rounded font-bold">
    Finalizar no WhatsApp
  </button>
</div>
</div>

<script>
function addToCart(id){
 const p=products.find(x=>x.id===id);
 const item=cart.find(i=>i.id===id);
 if(item){item.q+=1;} else{cart.push({...p,q:1});}
 updateCart();
}

function updateCart(){
 let total=0,count=0;
 const el=document.getElementById("cart-items");
 el.innerHTML="";
 cart.forEach(i=>{
  total+=i.price*i.q;
  count+=i.q;
  el.innerHTML+=`
    <div class="flex justify-between">
      <span>${i.q}x ${i.name}</span>
      <span>R$ ${(i.price*i.q).toFixed(2).replace('.',',')}</span>
    </div>`;
 });
 document.getElementById("cart-total").innerText=`R$ ${total.toFixed(2).replace('.',',')}`;
 document.getElementById("cart-count").innerText=count;
}

function clearCart(){ cart=[]; updateCart(); }

function toggleCart(){
 document.getElementById("cart").classList.toggle("translate-x-full");
}

function checkout(){
 if(!cart.length) return alert("Carrinho vazio");

 const nome=document.getElementById("nome").value;
 const endereco=document.getElementById("endereco").value;
 if(!nome||!endereco) return alert("Preencha nome e endereço");

 let msg=`Pedido:%0A`;
 let total=0;

 cart.forEach(i=>{
  msg+=`${i.q}x ${i.name}%0A`;
  total+=i.price*i.q;
 });

 msg+=`%0ATotal: R$ ${total.toFixed(2).replace('.',',')}`;
 msg+=`%0ANome: ${nome}%0AEndereço: ${endereco}`;

 window.open(`https://wa.me/5516981035718?text=${msg}`,"_blank");
}

/* AVALIAÇÕES */
let selectedStars=5;

function setStars(n){
 selectedStars=n;
 document.querySelectorAll('.star').forEach((s,i)=>{
  s.classList.toggle('active',i<n);
 });
}

function addComment(){
 const name=document.getElementById("comment-name").value;
 const text=document.getElementById("comment-text").value;
 if(!name||!text) return alert("Preencha tudo");

 const comments=JSON.parse(localStorage.getItem("comments")||"[]");
 comments.unshift({name,text,stars:selectedStars});
 localStorage.setItem("comments",JSON.stringify(comments));

 loadComments();
}

function loadComments(){
 const el=document.getElementById("comments");
 el.innerHTML="";
 const comments=JSON.parse(localStorage.getItem("comments")||"[]");

 comments.forEach(c=>{
  el.innerHTML+=`
  <div class="p-4 border rounded bg-amber-50">
    <div class="text-yellow-400">${"★".repeat(c.stars)}</div>
    <p>"${c.text}"</p>
    <b>${c.name}</b>
  </div>`;
 });
}

window.onload=()=>{
 setStars(5);
 loadComments();
};
</script>

</body>
</html>
