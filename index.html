<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entre Frutas</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#fdfaf6; }
.cart-slide { transition: transform .3s ease; }
.hidden { display:none; }
</style>
</head>

<body class="text-gray-800">

<!-- HEADER CENTRALIZADO -->
<header class="bg-amber-900 text-white sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-4 text-center relative">
    <h1 class="text-2xl font-bold">Entre Frutas</h1>

    <button onclick="toggleCart()" class="absolute right-4 top-4 text-xl">
      🛒
      <span id="cart-count"
        class="absolute -top-2 -right-2 bg-red-600 text-white text-xs px-2 rounded-full">0</span>
    </button>
  </div>
</header>

<!-- ESCOLHA INICIAL -->
<section id="home" class="py-12 text-center">
  <h2 class="text-3xl font-bold text-amber-900 mb-8">
    Escolha o que deseja 🍓
  </h2>

  <div class="flex flex-col md:flex-row gap-8 justify-center items-center">

    <div onclick="showCategory('geleias')"
      class="cursor-pointer bg-white p-6 rounded-xl shadow hover:scale-105 transition">
      <div class="text-6xl mb-3">🍓</div>
      <h3 class="text-xl font-bold">Geleias Artesanais</h3>
    </div>

    <div onclick="showCategory('acai')"
      class="cursor-pointer bg-white p-6 rounded-xl shadow hover:scale-105 transition">
      <div class="text-6xl mb-3">🥤</div>
      <h3 class="text-xl font-bold">Açaí na Garrafa</h3>
    </div>

  </div>
</section>

<!-- PRODUTOS -->
<main id="products" class="max-w-6xl mx-auto px-4 py-10 hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></main>

<!-- CARRINHO (NÃO MEXI) -->
<div id="cart"
 class="fixed top-0 right-0 w-full max-w-sm h-full bg-white shadow-lg cart-slide translate-x-full z-50 flex flex-col">

<div class="p-4 flex justify-between items-center border-b">
  <h3 class="font-bold">Seu carrinho</h3>
  <button onclick="toggleCart()">❌</button>
</div>

<div id="cart-items" class="flex-1 p-4 space-y-3 overflow-y-auto"></div>

<div class="p-4 border-t space-y-3">
  <p class="font-bold">Total: <span id="cart-total">R$ 0,00</span></p>

  <input id="nome" placeholder="Seu nome"
    class="w-full border p-2 rounded">

  <input id="endereco" placeholder="Endereço completo"
    class="w-full border p-2 rounded">

  <button onclick="clearCart()" class="w-full bg-gray-300 py-2 rounded">
    Limpar carrinho
  </button>

  <button onclick="checkout()"
    class="w-full bg-green-600 text-white py-3 rounded font-bold">
    Finalizar no WhatsApp
  </button>
</div>
</div>

<script>
let cart = [];
let tempQty = {};
let currentProducts = [];

/* ===== PRODUTOS ===== */
const geleias = [
 {id:1,name:"Geleia de Morango",price:25,img:"🍓"},
 {id:2,name:"Geleia de Abacaxi com Pimenta",price:24,img:"🍍"},
 {id:3,name:"Geleia de Frutas Vermelhas",price:28,img:"🍒"},
];

const acai = [
 {id:10,name:"Açaí com mousse de ninho (500ml)",price:22,img:"🥤"},
 {id:11,name:"Açaí com mousse de Morango (500ml)",price:26,img:"🥤"},
 {id:12,name:"Açaí com mousse de Maracujá (500ml)",price:22,img:"🥤"},
 {id:13,name:"Açaí com creme de Nutella (500ml)",price:28.5,img:"🥤"},
 {id:14,name:"Açaí com creme de Kinder (500ml)",price:28.5,img:"🥤"},
 {id:15,name:"Açaí com suco de Laranja (500ml)",price:20,img:"🥤"},

 {id:16,name:"Açaí com mousse de ninho (300ml)",price:13.99,img:"🥤"},
 {id:17,name:"Açaí com mousse de Morango (300ml)",price:16,img:"🥤"},
 {id:18,name:"Açaí com mousse de Maracujá (300ml)",price:13.99,img:"🥤"},
 {id:19,name:"Açaí com creme de Nutella (300ml)",price:18,img:"🥤"},
 {id:20,name:"Açaí com creme de Kinder (300ml)",price:18.5,img:"🥤"},
 {id:21,name:"Açaí com suco de Laranja (300ml)",price:15,img:"🥤"},
];

/* ===== TROCAR CATEGORIA ===== */
function showCategory(type){
  document.getElementById("home").classList.add("hidden");
  const container = document.getElementById("products");
  container.classList.remove("hidden");

  currentProducts = type === "geleias" ? geleias : acai;

  renderProducts();
}

/* ===== RENDER ===== */
function renderProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  currentProducts.forEach(p=>{
    container.innerHTML += `
    <div class="bg-white rounded-xl p-5 shadow text-center flex flex-col">
      <div class="text-5xl mb-3">${p.img}</div>
      <h3 class="font-bold mb-1">${p.name}</h3>
      <p class="mb-3 font-semibold">R$ ${p.price.toFixed(2).replace('.',',')}</p>

      <div class="flex justify-center items-center gap-3 mb-3">
        <button onclick="changeTemp(${p.id},-1)" class="px-2 border rounded">−</button>
        <span id="temp-${p.id}">1</span>
        <button onclick="changeTemp(${p.id},1)" class="px-2 border rounded">+</button>
      </div>

      <button onclick="addToCart(${p.id})"
        class="bg-amber-900 text-white py-2 rounded hover:bg-amber-800">
        Adicionar
      </button>
    </div>`;
  });
}

/* ===== CARRINHO ===== */
function changeTemp(id,d){
  tempQty[id]=(tempQty[id]||1)+d;
  if(tempQty[id]<1) tempQty[id]=1;
  document.getElementById(`temp-${id}`).innerText=tempQty[id];
}

function addToCart(id){
  const q=tempQty[id]||1;
  const p=currentProducts.find(x=>x.id===id);
  const item=cart.find(i=>i.id===id);

  if(item){ item.q+=q; }
  else{ cart.push({id:p.id,name:p.name,price:p.price,q}); }

  tempQty[id]=1;
  updateCart();
}

function updateCart(){
  const el=document.getElementById("cart-items");
  el.innerHTML="";
  let total=0,count=0;

  cart.forEach(i=>{
    total+=i.price*i.q;
    count+=i.q;
    el.innerHTML+=`
      <div class="flex justify-between">
        <span>${i.q}x ${i.name}</span>
        <span>R$ ${(i.price*i.q).toFixed(2).replace('.',',')}</span>
      </div>`;
  });

  document.getElementById("cart-total").innerText=`R$ ${total.toFixed(2).replace('.',',')}`;
  document.getElementById("cart-count").innerText=count;
}

function clearCart(){ cart=[]; updateCart(); }

function toggleCart(){
  document.getElementById("cart").classList.toggle("translate-x-full");
}

function checkout(){
  if(!cart.length) return alert("Carrinho vazio");

  const nome=document.getElementById("nome").value;
  const endereco=document.getElementById("endereco").value;
  if(!nome||!endereco) return alert("Preencha nome e endereço");

  let msg=`Pedido:%0A`;
  let total=0;

  cart.forEach(i=>{
    msg+=`${i.q}x ${i.name}%0A`;
    total+=i.price*i.q;
  });

  msg+=`%0ATotal: R$ ${total.toFixed(2).replace('.',',')}`;
  msg+=`%0ANome: ${nome}%0AEndereço: ${endereco}`;

  window.open(`https://wa.me/5516981035718?text=${msg}`,"_blank");
}
</script>

</body>
</html>
